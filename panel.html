<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel PGN</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Panel Institucional PGN</h1>
    <p id="infoUsuario"></p>
</header>

<nav>
    <button onclick="mostrarSeccion('constitucion')">Constitución</button>
    <button onclick="mostrarSeccion('codigo')">Código Penal</button>
    <button onclick="mostrarSeccion('expedientes')">Expedientes</button>
    <button onclick="cerrarSesion()">Cerrar Sesión</button>
</nav>

<!-- ================= CONSTITUCIÓN ================= -->
<section id="constitucion" class="seccion">

    <h2>Constitución</h2>

    <textarea 
        id="constitucionTexto" 
        placeholder="Aquí puedes pegar la Constitución completa..."
        style="width:100%; height:300px; margin-bottom:10px;">
    </textarea>

    <button onclick="guardarTextoLegal('constitucionTexto')">
        Guardar Constitución
    </button>

</section>

<!-- ================= CÓDIGO PENAL ================= -->
<section id="codigo" class="seccion" style="display:none;">

    <h2>Código Penal</h2>

    <textarea 
        id="codigoTexto" 
        placeholder="Aquí puedes pegar el Código Penal completo..."
        style="width:100%; height:300px; margin-bottom:10px;">
    </textarea>

    <button onclick="guardarTextoLegal('codigoTexto')">
        Guardar Código Penal
    </button>

</section>

<!-- ================= EXPEDIENTES ================= -->
<section id="expedientes" class="seccion" style="display:none;">

    <h2>Expedientes</h2>

    <div id="formExpediente" style="margin-bottom:20px;">
        <input 
            type="text" 
            id="nuevoExpediente" 
            placeholder="Nombre del expediente"
            style="padding:8px; width:250px;">
        <button onclick="agregarExpediente()">
            Añadir Expediente
        </button>
    </div>

    <div id="listaExpedientes"></div>

</section>

<script src="script.js"></script>
</body>
</html>
